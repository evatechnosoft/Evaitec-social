<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0e1420"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1ABC9C"/>
    </linearGradient>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17A2B8"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  <!-- Infinity symbol - nature side (left) -->
  <g transform="translate(200, 160)">
    <path d="M0,0 C-15,-30 -55,-30 -55,0 C-55,30 -15,30 0,0" fill="none" stroke="url(#leafGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Leaf veins on left -->
    <line x1="-40" y1="-8" x2="-28" y2="0" stroke="#2ECC71" stroke-width="1.2" opacity="0.5"/>
    <line x1="-40" y1="8" x2="-28" y2="0" stroke="#2ECC71" stroke-width="1.2" opacity="0.5"/>
    <!-- Tech side (right) -->
    <path d="M0,0 C15,-30 55,-30 55,0 C55,30 15,30 0,0" fill="none" stroke="url(#techGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Circuit traces on right -->
    <line x1="28" y1="-8" x2="40" y2="-8" stroke="#0077B6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="42" cy="-8" r="2" fill="#0077B6" opacity="0.5"/>
    <line x1="28" y1="8" x2="40" y2="8" stroke="#0077B6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="42" cy="8" r="2" fill="#0077B6" opacity="0.5"/>
    <!-- Center AI chip -->
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="none" stroke="url(#grad)" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="8" font-weight="700" fill="url(#grad)">AI</text>
  </g>
  <!-- Wordmark -->
  <text x="200" y="240" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="48" font-weight="300" fill="#FFFFFF" letter-spacing="6">ev@itec</text>
  <!-- Tagline -->
  <text x="200" y="275" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="10" font-weight="400" fill="#64748b" letter-spacing="4">YAZILIM &amp; YAPAY ZEKA</text>
</svg>
